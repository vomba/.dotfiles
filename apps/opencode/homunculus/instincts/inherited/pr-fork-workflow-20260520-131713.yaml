# PR from fork workflow

## Action
Fetch latest upstream main (git fetch origin main && git rebase origin/main).
Verify the base branch name (main vs master). Signoff with --signoff.
Fork with: gh repo fork --remote --remote-name=<user>
Create PR with: gh pr create --repo <org>/<repo> --head <user>:<branch> --base main

## Evidence
- Encountered error: "No commits between helmfile:master and fork:branch"
- Fix: --base main (not master)
- DCO required --signoff on commit

