# Wire continuous-learning observation capture for opencode

## Action
Enable the ECC compiled plugin in opencode.json. Create a small JS observation
plugin that calls observe.sh on tool.execute.before/after events. Pass stdin JSON
with tool_name, tool_input, cwd, session_id. Set CLAUDE_CODE_ENTRYPOINT=cli to
bypass the session guard. Create a writable observer config with enabled: true
and point CLV2_CONFIG env var to it.

## Evidence
- The ECC npm package ships a compiled plugin at .opencode/dist/plugins/
- observe.sh reads JSON from stdin in Claude Code hook format
- The observer lazily starts on first observation if enabled but not running
- Nix store files are read-only; use home.file symlinks for writable overrides

