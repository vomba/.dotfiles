name: Update and Build

on:
  schedule:
    - cron: '0 5 * * *' # Run daily at 5:00 UTC
  workflow_dispatch:

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Update flake inputs
        run: nix flake update
      - name: Check and apply overlay updates
        id: overlay-update
        run: |
          if ./scripts/check-updates.py --apply --yes; then
            echo "overlay_updates=false" >> $GITHUB_OUTPUT
          else
            RET=$?
            if [ $RET -eq 1 ]; then
              echo "overlay_updates=true" >> $GITHUB_OUTPUT
            else
              exit $RET
            fi
          fi
      - name: Commit overlay updates
        id: commit
        if: steps.overlay-update.outputs.overlay_updates == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add overlays/ flake.lock
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git diff --cached --name-only | grep -qvE '^(overlays/[^/]+\.nix|flake\.lock)$'; then
            echo "ERROR: Modified files outside overlays/ and flake.lock"
            git diff --cached --name-only
            exit 1
          fi
          git diff --cached --stat
          git commit -m "chore: update overlay package versions and flake.lock"
          echo "committed=true" >> $GITHUB_OUTPUT
      - name: Upload flake.lock
        uses: actions/upload-artifact@v7
        with:
          name: flake-lock
          path: flake.lock
      - name: Upload overlays
        uses: actions/upload-artifact@v7
        with:
          name: overlays
          path: overlays/

  build-linux:
    needs: update-lockfile
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: flake-lock
          path: .
      - uses: actions/download-artifact@v8
        with:
          name: overlays
          path: overlays
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v15
        with:
          name: vomba
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build Linux Home Manager Configuration
        run: nix build .#homeConfigurations.hani.activationPackage --no-link

  build-macos:
    needs: update-lockfile
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: flake-lock
          path: .
      - uses: actions/download-artifact@v8
        with:
          name: overlays
          path: overlays
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v15
        with:
          name: vomba
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build macOS Darwin Configuration
        run: nix build .#darwinConfigurations.Mac.system --no-link

  push-updates:
    needs: [build-linux, build-macos]
    if: needs.update-lockfile.outputs.committed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: actions/download-artifact@v8
        with:
          name: flake-lock
          path: .
      - uses: actions/download-artifact@v8
        with:
          name: overlays
          path: overlays
      - name: Push updates
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add overlays/ flake.lock
          git commit -m "chore: update overlay package versions and flake.lock" || exit 0
          git push origin ${{ github.ref_name }}
